name: Protocol Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test protocol
        run: cargo test --manifest-path protocol/src/Cargo.toml
      - name: Verify protocol version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          version=$(awk -F'"' '/^version =/ {print $2; exit}' protocol/src/Cargo.toml)
          tag="${GITHUB_REF_NAME}"
          if [ "v${version}" != "${tag}" ]; then
            echo "Protocol version mismatch: protocol/src/Cargo.toml=${version} tag=${tag}"
            exit 1
          fi
      - name: Publish protocol crate
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --manifest-path protocol/src/Cargo.toml -p alpine-protocol-rs --registry crates-io
